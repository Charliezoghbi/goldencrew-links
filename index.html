<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Crew</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="background-decoration top-left"></div>
  <div class="background-decoration bottom-right"></div>

  <main class="card">

    <div class="logo-circle">
      <img src="goldencrew_logo.png" alt="Golden Crew Logo">
    </div>

    <div class="title-row">
      <span></span>
      <h1>Golden Crew</h1>
      <span></span>
    </div>

    <p class="subtitle">Property Maintenance</p>

    <div class="small-divider">
      <span></span>
      <i class="fa-solid fa-diamond"></i>
      <span></span>
    </div>

    <section class="socials">

      <a class="social" href="https://www.linkedin.com/in/john-r-465703a4?utm_source=share_via&utm_content=profile&utm_medium=member_ios">
        <div class="social-icon">
          <i class="fab fa-linkedin-in"></i>
        </div>

        <div class="social-text">
          <strong>LinkedIn</strong>
          <span>Connect with us</span>
        </div>

        <i class="fa-solid fa-chevron-right arrow"></i>
      </a>

      <a class="social" href="https://www.instagram.com/goldencrewpropertymaintenance?igsh=MTF6MGZzeDF6cGJwaQ==">
        <div class="social-icon">
          <i class="fab fa-instagram"></i>
        </div>

        <div class="social-text">
          <strong>Instagram</strong>
          <span>Follow our journey</span>
        </div>

        <i class="fa-solid fa-chevron-right arrow"></i>
      </a>

      <a class="social" href="https://www.facebook.com/share/1BACfASXW1/?mibextid=wwXIfr">
        <div class="social-icon">
          <i class="fab fa-facebook-f"></i>
        </div>

        <div class="social-text">
          <strong>Facebook</strong>
          <span>Like our page</span>
        </div>

        <i class="fa-solid fa-chevron-right arrow"></i>
      </a>

    </section>

    <div class="bottom-decoration">
      <span></span>
      <i class="fa-solid fa-heart"></i>
      <span></span>
    </div>

  </main>

</body>
</html>
