<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Crew</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 25px;
}

.card {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: 24px;
  padding: 35px 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  border: 2px solid #d4af37;
}

.logo {
  font-size: 42px;
  color: #d4af37;
  margin-bottom: 12px;
}

h1 {
  color: #d4af37;
  font-size: 32px;
  letter-spacing: 3px;
}

.subtitle {
  color: #222;
  letter-spacing: 4px;
  margin: 8px 0 28px;
  font-size: 14px;
}

.line {
  width: 80px;
  height: 3px;
  background: #d4af37;
  margin: 0 auto 28px;
  border-radius: 10px;
}

.connect {
  font-size: 18px;
  letter-spacing: 3px;
  margin-bottom: 25px;
  color: #222;
}

.socials {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.social {
  display: flex;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  background: #f8f8f8;
  padding: 15px 18px;
  border-radius: 16px;
  color: #222;
  transition: 0.25s;
  border: 1px solid #eee;
}

.social:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 26px;
}

.linkedin { background: #0A66C2; }
.instagram { background: linear-gradient(135deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5); }
.facebook { background: #1877F2; }

.text {
  text-align: left;
}

.text strong {
  display: block;
  font-size: 20px;
}

.text span {
  color: #b8860b;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">
    <i class="fa-solid fa-house-chimney"></i>
  </div>

  <h1>GOLDEN CREW</h1>
  <div class="subtitle">PROPERTY MAINTENANCE</div>

  <div class="line"></div>

  <div class="connect">CONNECT WITH US</div>

  <div class="socials">

    <a class="social" href="https://www.linkedin.com/in/john-r-465703a4?utm_source=share_via&utm_content=profile&utm_medium=member_ios">
      <div class="icon linkedin">
        <i class="fab fa-linkedin-in"></i>
      </div>
      <div class="text">
        <strong>LinkedIn</strong>
        <span>Connect with us</span>
      </div>
    </a>

    <a class="social" href="https://www.instagram.com/goldencrewpropertymaintenance?igsh=MTF6MGZzeDF6cGJwaQ==">
      <div class="icon instagram">
        <i class="fab fa-instagram"></i>
      </div>
      <div class="text">
        <strong>Instagram</strong>
        <span>Follow our journey</span>
      </div>
    </a>

    <a class="social" href="https://www.facebook.com/share/1BACfASXW1/?mibextid=wwXIfr">
      <div class="icon facebook">
        <i class="fab fa-facebook-f"></i>
      </div>
      <div class="text">
        <strong>Facebook</strong>
        <span>Like our page</span>
      </div>
    </a>

  </div>
</div>

</body>
</html>
