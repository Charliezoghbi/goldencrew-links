<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Crew</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:25px;
}

.card{
  width:100%;
  max-width:420px;
  background:white;
  border-radius:24px;
  padding:35px 25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.logo{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:18px;
}

h1{
  color:#111;
  font-size:30px;
  letter-spacing:2px;
}

.subtitle{
  color:#666;
  margin:8px 0 28px;
  font-size:15px;
}

.socials{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.social{
  display:flex;
  align-items:center;
  gap:16px;
  text-decoration:none;
  padding:15px 18px;
  border-radius:16px;
  color:white;
  transition:0.25s;
}

.social:hover{
  transform:translateY(-3px);
}

.icon{
  font-size:26px;
  width:35px;
}

.linkedin{
  background:#0A66C2;
}

.instagram{
  background:linear-gradient(135deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
}

.facebook{
  background:#1877F2;
}

.text{
  text-align:left;
}

.text strong{
  display:block;
  font-size:20px;
}

.text span{
  font-size:14px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="card">

  <img src="goldencrew_logo.png" alt="Golden Crew Logo" class="logo">

  <h1>Golden Crew</h1>
  <div class="subtitle">Property Maintenance</div>

  <div class="socials">

    <a class="social linkedin" href="https://www.linkedin.com/in/john-r-465703a4?utm_source=share_via&utm_content=profile&utm_medium=member_ios">
      <i class="fab fa-linkedin-in icon"></i>
      <div class="text">
        <strong>LinkedIn</strong>
        <span>Connect with us</span>
      </div>
    </a>

    <a class="social instagram" href="https://www.instagram.com/goldencrewpropertymaintenance?igsh=MTF6MGZzeDF6cGJwaQ==">
      <i class="fab fa-instagram icon"></i>
      <div class="text">
        <strong>Instagram</strong>
        <span>Follow our journey</span>
      </div>
    </a>

    <a class="social facebook" href="https://www.facebook.com/share/1BACfASXW1/?mibextid=wwXIfr">
      <i class="fab fa-facebook-f icon"></i>
      <div class="text">
        <strong>Facebook</strong>
        <span>Like our page</span>
      </div>
    </a>

  </div>

</div>

</body>
</html>
